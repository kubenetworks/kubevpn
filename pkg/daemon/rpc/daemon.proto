syntax = "proto3";

option go_package = ".;rpc";

package rpc;

service Daemon {
  rpc Connect (stream ConnectRequest) returns (stream ConnectResponse) {}
  rpc Disconnect (stream DisconnectRequest) returns (stream DisconnectResponse) {}
  rpc Proxy (stream ProxyRequest) returns (stream ProxyResponse) {}
  rpc Leave (stream LeaveRequest) returns (stream LeaveResponse) {}
  rpc Sync (stream SyncRequest) returns (stream SyncResponse) {}
  rpc Unsync (stream UnsyncRequest) returns (stream UnsyncResponse) {}
  rpc ConnectionList (ConnectionListRequest) returns (ConnectionListResponse) {}
  rpc ConnectionUse (ConnectionUseRequest) returns (ConnectionUseResponse) {}

  rpc SshStart (SshStartRequest) returns (SshStartResponse) {}
  rpc SshStop (SshStopRequest) returns (SshStopResponse) {}
  rpc Route (RouteRequest) returns (RouteResponse) {}

  rpc Logs (stream LogRequest) returns (stream LogResponse) {}
  rpc Upgrade (UpgradeRequest) returns (UpgradeResponse) {}
  rpc Status (StatusRequest) returns (StatusResponse) {}
  rpc Version (VersionRequest) returns (VersionResponse) {}
  rpc Reset (stream ResetRequest) returns (stream ResetResponse) {}
  rpc Uninstall (stream UninstallRequest) returns (stream UninstallResponse) {}
  rpc Quit (stream QuitRequest) returns (stream QuitResponse) {}

  rpc Identify (IdentifyRequest) returns (IdentifyResponse) {}
}

message ConnectRequest {
  string KubeconfigBytes = 1;
  string Namespace = 2;

  // extra route table info
  ExtraRoute ExtraRoute = 4;

  // ssh jump
  SshJump SshJump = 5;

  // transfer image
  bool TransferImage = 6;
  string Image = 7;
  string ImagePullSecretName = 8;

  // foreground
  bool Foreground = 9;

  // log level
  int32 Level = 10;

  string OriginKubeconfigPath = 11;

  // The namespace where the traffic manager is to be found. Only works in cluster mode (install kubevpn server by helm)
  // reason: user helm install kubevpn server, and all users use this one kubevpn-traffic-manager instance
  // but if normal user don't have list namespace permission(for: helm list -A), needs to special this options.
  // 1. default is namespace kubevpn if kubevpn namespace is exists
  // 2. detect which namespace helm installed by (helm list -A), match app name==kubevpn and status is deployed
  // 3. otherwise, use options '-n' or '--namespace'
  string ManagerNamespace = 12;

  // Unique owner identifier for TunConfigService IP allocation
  string OwnerID = 15;

  // Connection identifier (namespace UID suffix), generated by user daemon
  string ConnectionID = 16;
}

message ConnectResponse {
  string message = 1;
  string connectionID = 2;
}

message DisconnectRequest {
  // 1) disconnect by connection id
  optional string ConnectionID = 1;
  // 2) disconnect all
  optional bool All = 2;
  // 3) disconnect by kubeconfig
  optional string KubeconfigBytes = 3;
  optional string Namespace = 4;
  SshJump SshJump = 5;
  // log level controlling what the daemon streams back to the CLI
  int32 Level = 6;
}

message DisconnectResponse {
  string Message = 1;
}


message ProxyRequest {
  string KubeconfigBytes = 1;
  string Namespace = 2;
  map<string, string> Headers = 3;
  repeated string PortMap = 4;
  repeated string Workloads = 5;

  // extra route table info
  ExtraRoute ExtraRoute = 8;

  // ssh jump
  SshJump SshJump = 9;

  // transfer image
  bool TransferImage = 10;
  string Image = 11;
  string ImagePullSecretName = 12;

  // foreground
  bool Foreground = 13;

  // log level
  int32 Level = 14;

  string OriginKubeconfigPath = 15;

  // The namespace where the traffic manager is to be found. Only works in cluster mode (install kubevpn server by helm)
  // reason: user helm install kubevpn server, and all users use this one kubevpn-traffic-manager instance
  // but if normal user don't have list namespace permission(for: helm list -A), needs to special this options.
  // 1. default is namespace kubevpn if kubevpn namespace is exists
  // 2. detect which namespace helm installed by (helm list -A), match app name==kubevpn and status is deployed
  // 3. otherwise, use options '-n' or '--namespace'
  string ManagerNamespace = 16;
}

message ProxyResponse {
  string Message = 1;
}

message LeaveRequest {
  string Namespace = 1;
  repeated string Workloads = 2;
  // log level controlling what the daemon streams back to the CLI
  int32 Level = 3;
}

message LeaveResponse {
  string Message = 1;
}

message SyncRequest {
  string KubeconfigBytes = 1;
  string Namespace = 2;
  map<string, string> Headers = 3;
  repeated string Workloads = 4;

  // extra route table info
  ExtraRoute ExtraRoute = 7;

  // ssh jump
  SshJump SshJump = 8;

  // target cluster info
  string TargetContainer = 11;
  string TargetImage = 12;

  // transfer image
  bool TransferImage = 15;
  string Image = 16;
  string ImagePullSecretName = 17;

  // log level
  int32 Level = 18;

  string OriginKubeconfigPath = 19;

  string LocalDir = 20;
  string RemoteDir = 21;
}

message SyncResponse {
  string Message = 1;
}

message UnsyncRequest {
  repeated string Workloads = 1;
  // log level controlling what the daemon streams back to the CLI
  int32 Level = 2;
}

message UnsyncResponse {
  string Message = 1;
}

message ConnectionListRequest {
}

message ConnectionListResponse {
  repeated Status List = 1;
  string CurrentConnectionID = 2;
}

message ConnectionUseRequest {
  string ConnectionID = 1;
}

message ConnectionUseResponse {
  string Message = 1;
}

message QuitRequest {
  // log level controlling what the daemon streams back to the CLI
  int32 Level = 1;
}

message QuitResponse {
  string Message = 1;
}

message StatusRequest {
  repeated string ConnectionIDs = 1;
}

message StatusResponse {
  string CurrentConnectionID = 1;
  repeated Status List = 2;
}

message Status {
  string ConnectionID = 2;
  string Cluster = 3;
  string Kubeconfig = 5;
  string Namespace = 6;
  string Status = 7;
  string Netif = 8;
  string IPv4 = 9;
  repeated Proxy ProxyList = 10;
  repeated Sync SyncList = 11;
  string IPv6 = 12;
}

message Proxy {
  string ConnectionID = 1;
  string Cluster = 2;
  string Kubeconfig = 3;
  string Namespace = 4;
  string Workload = 5;
  repeated ProxyRule RuleList = 6;
}

message ProxyRule {
  map<string, string>  Headers = 1;
  string LocalTunIPv4 = 2;
  string LocalTunIPv6 = 3;
  bool CurrentDevice = 4;
  map<int32, int32>  PortMap = 5;
}

message Sync {
  string ConnectionID = 1;
  string Cluster = 2;
  string Kubeconfig = 3;
  string Namespace = 4;
  string Workload = 5;
  string SyncthingGUIAddr = 6;
  repeated SyncRule RuleList = 7;
}

message SyncRule {
  map<string, string> Headers = 1;
  string DstWorkload = 2;
}

message VersionRequest {
}

message VersionResponse {
  string Version = 1;
}

message SshStartRequest {
  string ClientIP = 1;
}

message SshStartResponse {
  string ServerIP = 1;
}

message SshStopRequest {
  string ClientIP = 1;
}

message SshStopResponse {
  string ServerIP = 1;
}

message RouteRequest {
  string cidr = 1;
  RouteType type = 2;
  string dev = 3;
}

enum RouteType {
  ROUTE_ADD = 0;
  ROUTE_DELETE = 1;
}

message RouteResponse {
  string message = 1;
}

message SshConnectRequest {
  string Stdin = 1;
  SshJump SshJump = 2;
}

message SshConnectResponse {
  string Stdout = 1;
  string Stderr = 2;
}

message LogRequest {
  bool Follow = 1;
  int32 Lines = 2;
}

message LogResponse {
  string Message = 1;
}

message UpgradeRequest {
  string ClientVersion = 1;
}

message UpgradeResponse {
  bool NeedUpgrade = 1;
}

message UninstallRequest {
  string KubeconfigBytes = 1;
  string Namespace = 2;
  // ssh jump
  SshJump SshJump = 3;
  // log level controlling what the daemon streams back to the CLI
  int32 Level = 4;
}

message UninstallResponse {
  string Message = 1;
}

message ResetRequest {
  string KubeconfigBytes = 1;
  string Namespace = 2;
  repeated string Workloads = 3;
  // ssh jump
  SshJump SshJump = 4;
  // log level controlling what the daemon streams back to the CLI
  int32 Level = 5;
}

message ResetResponse {
  string Message = 1;
}

message SshJump {
  string Addr = 1;
  string User = 2;
  string Password = 3;
  string Keyfile = 4;
  string Jump = 5;
  string ConfigAlias = 6;
  string RemoteKubeconfig = 7;
  string GSSAPIKeytabConf = 8;
  string GSSAPIPassword = 9;
  string GSSAPICacheFile = 10;
}

message ExtraRoute {
  repeated string ExtraCIDR = 1;
  repeated string ExtraDomain = 2;
  bool ExtraNodeIP = 3;
}

message IdentifyRequest {}

message IdentifyResponse {
  string ID = 1;
}

message Cancel {}

// TunConfigService is served by the traffic manager's xds (port 9002).
// Sidecars call GetTunIP on startup to allocate an IP, then WatchTunIP for changes.
service TunConfigService {
  // GetTunIP allocates or retrieves the TUN IP for the given owner.
  // If ownerID already has an allocation, returns the existing IP.
  // Otherwise, DHCP-allocates a new IP and returns it.
  rpc GetTunIP(TunIPRequest) returns (TunIPResponse) {}

  // WatchTunIP opens a server-streaming connection that pushes new TunIPResponse
  // whenever the owner's IP allocation changes (e.g., conflict resolution, re-allocation).
  rpc WatchTunIP(TunIPRequest) returns (stream TunIPResponse) {}

  // WatchNamespaceRoutes streams pod route prefixes and service records for a
  // namespace, discovered server-side by the traffic manager (a single shared
  // informer per namespace) instead of a per-client cluster-wide list-watch.
  // The first frame is a full snapshot (Snapshot=true); subsequent frames are
  // deltas. Enabled=false means the manager lacks RBAC to watch the namespace
  // and the client should degrade to CIDR-only routing.
  rpc WatchNamespaceRoutes(NamespaceRoutesRequest) returns (stream NamespaceRoutesResponse) {}

}

message TunIPRequest {
  string OwnerID = 1;              // sidecar identity (typically podName or nodeID)
  string Namespace = 2;            // workload namespace (for DHCP scoping)
  repeated string ExcludeIPs = 4;  // client local interface IPs to avoid during allocation
  string ConfirmIP = 5;            // client confirms it validated this proposed (dry-run) IP; server commits it
  string Hostname = 6;             // client machine name, recorded in TUN_ALLOCS for debugging (field 3 is a historical gap, do not reuse)
}

message TunIPResponse {
  string IPv4 = 1;        // allocated IPv4 in CIDR notation, e.g. "198.18.0.5/32"
  string IPv6 = 2;        // allocated IPv6 in CIDR notation, e.g. "fd11::5/128"
  int64  Version = 3;     // monotonically increasing version for change detection
  bool   DryRun = 4;      // true = a proposal: client must validate locally, then confirm or decline (do NOT apply directly)
}

message NamespaceRoutesRequest {
  string Namespace = 1;   // workload namespace the client wants routes/DNS for
}

// ServiceRecord carries the minimal service fields the client needs for routing
// and DNS/hosts generation (name -> ClusterIP / ExternalName).
message ServiceRecord {
  string Name = 1;
  string Namespace = 2;
  repeated string ClusterIPs = 3;  // ClusterIP + ClusterIPs (headless "None" filtered client-side)
  string ExternalName = 4;
}

message NamespaceRoutesResponse {
  bool Snapshot = 1;                        // true = full state (initial / reconnect / resync); false = delta
  repeated string AddedPodCIDRs = 2;        // pod route prefixes to add (server-aggregated: IPv4 /24, IPv6 /64)
  repeated string RemovedPodCIDRs = 3;      // prefixes no longer backed by any pod (client keeps route, updates state only)
  repeated ServiceRecord UpsertedServices = 4; // added/changed services (for DNS)
  repeated string RemovedServiceKeys = 5;   // "namespace/name" of deleted services (client removes hosts entry)
  int64 Version = 6;                         // monotonically increasing version for change detection
  bool Enabled = 7;                          // false = server not discovering (no RBAC) -> client degrades to CIDR-only
}