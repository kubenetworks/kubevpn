apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kubevpn.fullname" . }}
  namespace: {{ include "kubevpn.namespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kubevpn.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kubevpn.fullname" . }}
    namespace: {{ include "kubevpn.namespace" . }}
