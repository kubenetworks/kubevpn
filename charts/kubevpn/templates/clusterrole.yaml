{{- if .Values.rbac.proxyClusterRole }}
# Cluster-scoped RBAC for server-side sidecar injection (ProxyInject / LeaveInject).
# A helm central install serves clients across ALL namespaces, so the traffic manager
# needs to patch workloads cluster-wide. Wildcard resources cover any workload type,
# including CRD-based workloads (e.g. Argo Rollouts). The per-connection `kubevpn connect`
# path instead creates a namespaced Role (see pkg/handler genProxyRole); this ClusterRole
# is only for the centralized helm deployment.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubevpn.fullname" . }}-proxy
  labels:
    {{- include "kubevpn.labels" . | nindent 4 }}
rules:
  - apiGroups: [ "*" ]
    resources: [ "*" ]
    verbs: [ "get", "list", "watch", "create", "delete", "patch", "update" ]
{{- end }}
