name: Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  image:
    runs-on: ubuntu-latest
    env:
      # Single source of truth: the binary's embedded config.Version AND the image tag both use
      # this, so `kubevpn version` inside the image matches the image tag (the version-compat
      # gate compares them).
      VERSION: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build kubevpn binary
        # VERSION env overrides the Makefile default (?=), embedding it via -X config.Version.
        run: make kubevpn-linux-amd64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/test.Dockerfile
          push: true
          tags: ghcr.io/kubenetworks/kubevpn:${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  linux:
    runs-on: ubuntu-latest
    needs: [ "image" ]
    env:
      # Same VERSION as the image job: the built binary's config.Version/config.Image
      # match the pushed image tag, so the version-compat gate passes and in-process
      # deploy paths reference an image that actually exists.
      VERSION: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: Setup Minikube
        id: minikube
        timeout-minutes: 30
        uses: medyagh/setup-minikube@latest
        with:
          cache: true
          cpus: 'max'
          memory: 'max'

      - name: Kubernetes info
        run: |
          kubectl cluster-info
          cat ~/.kube/config
          kubectl get pods -n kube-system -o wide
      - name: Install demo bookinfo
        run: |
          minikube image load --remote ghcr.io/kubenetworks/examples-bookinfo-details-v1:1.20.2
          minikube image load --remote ghcr.io/kubenetworks/examples-bookinfo-ratings-v1:1.20.2
          minikube image load --remote ghcr.io/kubenetworks/examples-bookinfo-reviews-v1:1.20.2
          minikube image load --remote ghcr.io/kubenetworks/examples-bookinfo-productpage-v1:1.20.2
          minikube image load --remote ghcr.io/kubenetworks/authors:latest
          minikube image load --remote ghcr.io/kubenetworks/nginx:latest
          minikube image ls
          eval $(minikube docker-env)
          kubectl apply -f samples/bookinfo.yaml

      - name: Build
        run: |
          make kubevpn-linux-amd64
          chmod +x ./bin/kubevpn
          cp ./bin/kubevpn /usr/local/bin/kubevpn
          kubevpn version

      - name: Wait for pods reviews to be ready
        run: |
          while ! kubectl wait --for=condition=Ready pods --all --timeout=3600s; do sleep 2; done
          kubectl get svc -A -o wide
          kubectl get pod -A -o wide
          kubectl get all -o wide
          kubectl get nodes -o yaml
          ifconfig
          route -n
          sudo ln /usr/bin/resolvectl /usr/bin/systemd-resolve
          docker run -d \
            --name=ssh \
            -e PUID=1000 \
            -e PGID=0 \
            -e TZ=Etc/UTC \
            -e LANG=C.UTF-8 \
            -e SUDO_ACCESS=true \
            -e PASSWORD_ACCESS=true \
            -e USER_PASSWORD=naison \
            -e USER_NAME=naison \
            -e DOCKER_MODS=linuxserver/mods:openssh-server-ssh-tunnel \
            -p 127.0.0.1:2222:2222 \
            --restart always \
            --privileged \
            --net host \
            lscr.io/linuxserver/openssh-server:latest

      - name: Test
        run: make ut

      - name: Test (TUN)
        run: sudo -E env HOME="$HOME" PATH="$PATH" make ut-tun

  macos:
    runs-on:  macos-15-intel
    needs: [ "image" ]
    # Split the two heavy handler e2e suites across separate jobs, each on its own
    # minikube cluster. A single ~90m run overloads the macOS runner's nested-VM
    # apiserver into multi-minute TLS-handshake-timeout stalls, which blackout the
    # traffic-manager pod and permanently break the mesh sidecar xDS stream — the
    # mesh subtests then fail on infra flakiness, not code. Halving each cluster's
    # sustained load avoids the degradation. See docs/43-macos-ci-apiserver-flakiness.md.
    strategy:
      fail-fast: false
      matrix:
        suite: [ '^TestFunctions$', '^TestSSHFunctions$' ]
    env:
      # Same VERSION as the image job (see linux job).
      VERSION: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: Set up Docker
        uses: docker/setup-docker-action@v4
        with:
          daemon-config: |
            {
              "debug": true,
              "features": {
                "containerd-snapshotter": true
              }
            }
      - uses: azure/setup-kubectl@v4
      - name: Install minikube
        timeout-minutes: 30
        uses: medyagh/setup-minikube@latest
        with:
          cache: true
          cpus: 'max'
          memory: 'max'

      - name: Kubernetes info
        run: |
          kubectl config view --flatten --raw
          kubectl get pod -A -o wide
          kubectl cluster-info
          cat ~/.kube/config
          kubectl get pods -n kube-system -o wide

      - name: Install demo bookinfo
        run: |
          kubectl apply -f samples/bookinfo.yaml

      - name: Build
        run: |
          make kubevpn-darwin-amd64
          chmod +x ./bin/kubevpn
          cp ./bin/kubevpn /usr/local/bin/kubevpn
          kubevpn version

      - name: Wait for pods reviews to be ready
        run: |
          while ! kubectl wait --for=condition=Ready pods --all --timeout=3600s; do sleep 2; done
          kubectl get svc -A -o wide || true
          kubectl get pod -A -o wide || true
          kubectl get all -o wide || true
          kubectl get nodes -o yaml || true
          ifconfig
          netstat -anr
          docker run -d \
            --name=ssh \
            -e PUID=1000 \
            -e PGID=0 \
            -e TZ=Etc/UTC \
            -e LANG=C.UTF-8 \
            -e SUDO_ACCESS=true \
            -e PASSWORD_ACCESS=true \
            -e USER_PASSWORD=naison \
            -e USER_NAME=naison \
            -e DOCKER_MODS=linuxserver/mods:openssh-server-ssh-tunnel \
            -p 127.0.0.1:2222:2222 \
            --restart always \
            --privileged \
            --net host \
            lscr.io/linuxserver/openssh-server:latest

      - name: Test
        env:
          TMPDIR: .
          E2E_RUN: ${{ matrix.suite }}
        run: make ut

      # The TUN suite (tun build tag, CAP_NET_ADMIN) is independent of the e2e
      # split; run it once — on the TestFunctions leg only — to avoid duplicating
      # the same root-privileged run across both matrix jobs.
      - name: Test (TUN)
        if: matrix.suite == '^TestFunctions$'
        env:
          TMPDIR: .
        run: sudo -E env HOME="$HOME" PATH="$PATH" TMPDIR="$TMPDIR" make ut-tun

  windows:
    runs-on: windows-latest
    # No `needs: [ "image" ]`: Windows runs only the no-cluster test suite, so it
    # needs neither the pushed test image nor a Kubernetes cluster.
    #
    # windows-latest hosted runners cannot run a Linux Kubernetes cluster natively
    # (their Docker is Windows/windowsfilter, and WSL2 kind is too flaky to rely on),
    # so we intentionally skip every test that needs a kubeconfig. Those tests live
    # behind the `integration` build tag and run in the linux/macos jobs instead.
    env:
      VERSION: ${{ github.event.pull_request.head.sha || github.sha }}
    defaults:
      run:
        # The Makefile relies on `VAR=x go build` env-prefixes plus cp/eval, which
        # PowerShell can't run — force bash (git bash ships on windows runners).
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install make
        run: choco install -y make

      - name: Build kubevpn.exe (compile check)
        run: |
          make kubevpn-windows-amd64
          ./bin/kubevpn.exe version

      - name: Test (no cluster / no kubeconfig)
        # Runs `make ut-no-cluster` = `go test` WITHOUT `-tags=integration`, so only
        # the tests that need no kubeconfig / real cluster are compiled and run.
        run: make ut-no-cluster
        # No TUN step: Windows CI runners don't run as Administrator, and the
        # wintun driver needs elevation. TUN tests run on Linux/macOS instead.