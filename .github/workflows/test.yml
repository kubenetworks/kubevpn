name: Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  image:
    runs-on: ubuntu-latest
    env:
      # Single source of truth: the binary's embedded config.Version AND the image tag both use
      # this, so `kubevpn version` inside the image matches the image tag (the version-compat
      # gate compares them).
      VERSION: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build kubevpn binary
        # VERSION env overrides the Makefile default (?=), embedding it via -X config.Version.
        run: make kubevpn-linux-amd64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/test.Dockerfile
          push: true
          tags: ghcr.io/kubenetworks/kubevpn:${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  linux:
    runs-on: ubuntu-latest
    needs: [ "image" ]
    env:
      # Same VERSION as the image job: the built binary's config.Version/config.Image
      # match the pushed image tag, so the version-compat gate passes and in-process
      # deploy paths reference an image that actually exists.
      VERSION: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
      - name: Setup Minikube
        id: minikube
        timeout-minutes: 30
        uses: medyagh/setup-minikube@latest
        with:
          cache: true
          cpus: 'max'
          memory: 'max'

      - name: Kubernetes info
        run: |
          kubectl cluster-info
          cat ~/.kube/config
          kubectl get pods -n kube-system -o wide
      - name: Install demo bookinfo
        run: |
          minikube image load --remote ghcr.io/kubenetworks/examples-bookinfo-details-v1:1.20.2
          minikube image load --remote ghcr.io/kubenetworks/examples-bookinfo-ratings-v1:1.20.2
          minikube image load --remote ghcr.io/kubenetworks/examples-bookinfo-reviews-v1:1.20.2
          minikube image load --remote ghcr.io/kubenetworks/examples-bookinfo-productpage-v1:1.20.2
          minikube image load --remote ghcr.io/kubenetworks/authors:latest
          minikube image load --remote ghcr.io/kubenetworks/nginx:latest
          minikube image ls
          eval $(minikube docker-env)
          kubectl apply -f samples/bookinfo.yaml

      - name: Build
        run: |
          make kubevpn-linux-amd64
          chmod +x ./bin/kubevpn
          cp ./bin/kubevpn /usr/local/bin/kubevpn
          kubevpn version

      - name: Wait for pods reviews to be ready
        run: |
          while ! kubectl wait --for=condition=Ready pods --all --timeout=3600s; do sleep 2; done
          kubectl get svc -A -o wide
          kubectl get pod -A -o wide
          kubectl get all -o wide
          kubectl get nodes -o yaml
          ifconfig
          route -n
          sudo ln /usr/bin/resolvectl /usr/bin/systemd-resolve
          docker run -d \
            --name=ssh \
            -e PUID=1000 \
            -e PGID=0 \
            -e TZ=Etc/UTC \
            -e LANG=C.UTF-8 \
            -e SUDO_ACCESS=true \
            -e PASSWORD_ACCESS=true \
            -e USER_PASSWORD=naison \
            -e USER_NAME=naison \
            -e DOCKER_MODS=linuxserver/mods:openssh-server-ssh-tunnel \
            -p 127.0.0.1:2222:2222 \
            --restart always \
            --privileged \
            --net host \
            lscr.io/linuxserver/openssh-server:latest

      - name: Test
        run: make ut

      - name: Test (TUN)
        run: sudo -E env HOME="$HOME" PATH="$PATH" make ut-tun

  macos:
    runs-on:  macos-15-intel
    needs: [ "image" ]
    # Split the two heavy handler e2e suites across separate jobs, each on its own
    # runner + minikube cluster. A single ~90m run overloads the macOS runner's
    # nested-VM apiserver into multi-minute TLS-handshake-timeout stalls, which
    # blackout the traffic-manager pod and break the mesh sidecar xDS stream — the
    # mesh subtests then fail on infra flakiness, not code. Halving each cluster's
    # sustained load avoids the degradation. See docs/43-macos-ci-apiserver-flakiness.md.
    strategy:
      fail-fast: false
      matrix:
        suite: [ '^TestFunctions$', '^TestSSHFunctions$' ]
    env:
      # Same VERSION as the image job (see linux job).
      VERSION: ${{ github.event.pull_request.head.sha || github.sha }}
      # macOS has no Docker daemon, so we run one in a colima VM. lima (colima's
      # backend) refuses to run as root, so everything here runs as the normal runner
      # user — mirroring the linux job, where `make ut` runs unprivileged and kubevpn
      # self-elevates its own root data-plane daemon via passwordless sudo. Because
      # the test runs as the runner, run-mode t.TempDir() dirs are runner-owned and
      # colima's reverse-sshfs file server (also the runner) can read them. DOCKER_HOST
      # is exported after colima start; KUBECONFIG stays the runner default
      # (~/.kube/config), where the docker-driver minikube writes it.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - uses: azure/setup-kubectl@v4

      # Docker daemon in a colima VM, started as the runner (lima forbids root).
      # --mount "<workspace>:w" makes the checkout writable inside the VM so the
      # run-mode tests can bind-mount their temp dirs (TMPDIR lives under the
      # workspace). The reverse-sshfs file server runs as the runner, matching the
      # runner-owned test files. Give the VM all the runner has minus a small host
      # reserve (the host still runs the heavy side: kubevpn data plane, TUN, go
      # test, local servers). Export DOCKER_HOST so later steps and the test share
      # this daemon.
      - name: Set up Docker (colima)
        run: |
          brew install colima docker
          HOST_RESERVE_MB=2048
          TOTAL_MB=$(( $(sysctl -n hw.memsize) / 1024 / 1024 ))
          VM_GB=$(( (TOTAL_MB - HOST_RESERVE_MB) / 1024 ))
          CPUS=$(sysctl -n hw.logicalcpu)
          echo "host=${TOTAL_MB}MiB cpus=${CPUS} -> colima memory=${VM_GB}GiB"
          colima start \
            --mount-type sshfs \
            --mount "${GITHUB_WORKSPACE}:w" \
            --cpus "$CPUS" --memory "$VM_GB" --disk 60
          echo "DOCKER_HOST=unix://${HOME}/.colima/default/docker.sock" >> "$GITHUB_ENV"
          docker info

      # minikube uses the docker driver against the runner's colima daemon and runs
      # as the runner, writing its kubeconfig to the default ~/.kube/config shared by
      # every later step and the test. --memory/--cpus max is a limit (not a
      # reservation) of the VM's size; the run-mode and ssh containers share what k8s
      # does not actually use.
      - name: Install minikube
        timeout-minutes: 30
        run: |
          brew install minikube
          minikube start --driver=docker --cpus max --memory max --wait all
          minikube status

      - name: Kubernetes info
        run: |
          kubectl config view --flatten --raw
          kubectl get pod -A -o wide
          kubectl cluster-info
          kubectl get pods -n kube-system -o wide

      - name: Install demo bookinfo
        run: |
          kubectl apply -f samples/bookinfo.yaml

      - name: Build
        run: |
          make kubevpn-darwin-amd64
          chmod +x ./bin/kubevpn
          sudo cp ./bin/kubevpn /usr/local/bin/kubevpn
          kubevpn version

      - name: Wait for pods reviews to be ready
        run: |
          while ! kubectl wait --for=condition=Ready pods --all --timeout=3600s; do sleep 2; done
          kubectl get svc -A -o wide || true
          kubectl get pod -A -o wide || true
          kubectl get all -o wide || true
          kubectl get nodes -o yaml || true
          ifconfig
          netstat -anr
          docker run -d \
            --name=ssh \
            -e PUID=1000 \
            -e PGID=0 \
            -e TZ=Etc/UTC \
            -e LANG=C.UTF-8 \
            -e SUDO_ACCESS=true \
            -e PASSWORD_ACCESS=true \
            -e USER_PASSWORD=naison \
            -e USER_NAME=naison \
            -e DOCKER_MODS=linuxserver/mods:openssh-server-ssh-tunnel \
            -p 127.0.0.1:2222:2222 \
            --restart always \
            --privileged \
            --net host \
            lscr.io/linuxserver/openssh-server:latest

      - name: Test
        env:
          # Each matrix job runs one e2e suite on its own cluster (see the strategy
          # comment above); make ut passes this to `go test -run`.
          E2E_RUN: ${{ matrix.suite }}
          # NOT TMPDIR=. : cgo writes its temp files (cgo-gcc-input-*) into TMPDIR, and the
          # workspace root is not reliably writable by the compile process, so `.` fails with
          # "permission denied". Use a dedicated, pre-created, world-writable dir under the
          # workspace: it stays inside colima's --mount (so run-mode bind mounts still see
          # t.TempDir()), while 0777 lets whichever user runs the compile write there.
          TMPDIR: ${{ github.workspace }}/tmp
        # Runs as the runner (not root): kubevpn self-elevates its root data-plane
        # daemon via passwordless sudo, exactly like the linux job. DOCKER_HOST (from
        # the colima step) and KUBECONFIG (~/.kube/config) are inherited from the
        # environment, so the run-mode docker client and the cluster client resolve.
        run: |
          mkdir -p "$TMPDIR" && chmod 777 "$TMPDIR"
          make ut

  windows:
    runs-on: windows-latest
    # No `needs: [ "image" ]`: Windows runs only the no-cluster test suite, so it
    # needs neither the pushed test image nor a Kubernetes cluster.
    #
    # windows-latest hosted runners cannot run a Linux Kubernetes cluster natively
    # (their Docker is Windows/windowsfilter, and WSL2 kind is too flaky to rely on),
    # so we intentionally skip every test that needs a kubeconfig. Those tests live
    # behind the `integration` build tag and run in the linux/macos jobs instead.
    env:
      VERSION: ${{ github.event.pull_request.head.sha || github.sha }}
    defaults:
      run:
        # The Makefile relies on `VAR=x go build` env-prefixes plus cp/eval, which
        # PowerShell can't run — force bash (git bash ships on windows runners).
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install make
        run: choco install -y make

      - name: Build kubevpn.exe (compile check)
        run: |
          make kubevpn-windows-amd64
          ./bin/kubevpn.exe version

      - name: Test (no cluster / no kubeconfig)
        # Runs `make ut-no-cluster` = `go test` WITHOUT `-tags=integration`, so only
        # the tests that need no kubeconfig / real cluster are compiled and run.
        run: make ut-no-cluster
        # No TUN step: Windows CI runners don't run as Administrator, and the
        # wintun driver needs elevation. TUN tests run on Linux/macOS instead.