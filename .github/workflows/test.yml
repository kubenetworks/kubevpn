name: Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build kubevpn binary
        run: make kubevpn-linux-amd64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/test.Dockerfile
          push: true
          tags: ghcr.io/kubenetworks/kubevpn:${{ github.event.pull_request.head.sha || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  linux:
    runs-on: ubuntu-latest
    needs: [ "image" ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          check-latest: true
      - name: Setup Minikube
        id: minikube
        timeout-minutes: 30
        uses: medyagh/setup-minikube@latest
        with:
          cache: true
          cpus: 'max'
          memory: 'max'

      - name: Kubernetes info
        run: |
          kubectl cluster-info
          cat ~/.kube/config
          kubectl get pods -n kube-system -o wide
      - name: Install demo bookinfo
        run: |
          minikube image load --remote ghcr.io/kubenetworks/examples-bookinfo-details-v1:1.20.2
          minikube image load --remote ghcr.io/kubenetworks/examples-bookinfo-ratings-v1:1.20.2
          minikube image load --remote ghcr.io/kubenetworks/examples-bookinfo-reviews-v1:1.20.2
          minikube image load --remote ghcr.io/kubenetworks/examples-bookinfo-productpage-v1:1.20.2
          minikube image load --remote ghcr.io/kubenetworks/authors:latest
          minikube image load --remote ghcr.io/kubenetworks/nginx:latest
          minikube image ls
          eval $(minikube docker-env)
          kubectl apply -f samples/bookinfo.yaml

      - name: Build
        run: |
          export VERSION=${{github.event.pull_request.head.sha}}
          if [[ -z "$VERSION" ]]; then
            export VERSION=${{ github.sha }}
          fi
          make kubevpn-linux-amd64
          chmod +x ./bin/kubevpn
          cp ./bin/kubevpn /usr/local/bin/kubevpn
          kubevpn version

      - name: Wait for pods reviews to be ready
        run: |
          while ! kubectl wait --for=condition=Ready pods --all --timeout=3600s; do sleep 2; done
          kubectl get svc -A -o wide
          kubectl get pod -A -o wide
          kubectl get all -o wide
          kubectl get nodes -o yaml
          ifconfig
          route -n
          sudo ln /usr/bin/resolvectl /usr/bin/systemd-resolve
          docker run -d \
            --name=ssh \
            -e PUID=1000 \
            -e PGID=0 \
            -e TZ=Etc/UTC \
            -e LANG=C.UTF-8 \
            -e SUDO_ACCESS=true \
            -e PASSWORD_ACCESS=true \
            -e USER_PASSWORD=naison \
            -e USER_NAME=naison \
            -e DOCKER_MODS=linuxserver/mods:openssh-server-ssh-tunnel \
            -p 127.0.0.1:2222:2222 \
            --restart always \
            --privileged \
            --net host \
            lscr.io/linuxserver/openssh-server:latest

      - name: Test
        # Run as root for TUN/route setup, but preserve the runner's kubeconfig.
        # Plain `sudo` resets HOME/KUBECONFIG, so client-go falls back to its
        # default server http://localhost:8080 (which collides with the test's
        # own dummy HTTP server) and every API call fails with
        # "serializer for text/plain; charset=utf-8 doesn't exist".
        run: sudo -E env HOME="$HOME" KUBECONFIG="$HOME/.kube/config" make ut

  macos:
    runs-on:  macos-15-intel
    needs: [ "image" ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          check-latest: true

      - name: Set up Docker
        uses: docker/setup-docker-action@v4
        with:
          daemon-config: |
            {
              "debug": true,
              "features": {
                "containerd-snapshotter": true
              }
            }
      - uses: azure/setup-kubectl@v4
      - name: Install minikube
        timeout-minutes: 30
        uses: medyagh/setup-minikube@latest
        with:
          cache: true
          cpus: 'max'
          memory: 'max'

      - name: Kubernetes info
        run: |
          kubectl config view --flatten --raw
          kubectl get pod -A -o wide
          kubectl cluster-info
          cat ~/.kube/config
          kubectl get pods -n kube-system -o wide

      - name: Install demo bookinfo
        run: |
          kubectl apply -f samples/bookinfo.yaml

      - name: Build
        run: |
          export VERSION=${{github.event.pull_request.head.sha}}
          if [[ -z "$VERSION" ]]; then
            export VERSION=${{ github.sha }}
          fi
          make kubevpn-darwin-amd64
          chmod +x ./bin/kubevpn
          cp ./bin/kubevpn /usr/local/bin/kubevpn
          kubevpn version

      - name: Wait for pods reviews to be ready
        run: |
          while ! kubectl wait --for=condition=Ready pods --all --timeout=3600s; do sleep 2; done
          kubectl get svc -A -o wide || true
          kubectl get pod -A -o wide || true
          kubectl get all -o wide || true
          kubectl get nodes -o yaml || true
          ifconfig
          netstat -anr
          docker run -d \
            --name=ssh \
            -e PUID=1000 \
            -e PGID=0 \
            -e TZ=Etc/UTC \
            -e LANG=C.UTF-8 \
            -e SUDO_ACCESS=true \
            -e PASSWORD_ACCESS=true \
            -e USER_PASSWORD=naison \
            -e USER_NAME=naison \
            -e DOCKER_MODS=linuxserver/mods:openssh-server-ssh-tunnel \
            -p 127.0.0.1:2222:2222 \
            --restart always \
            --privileged \
            --net host \
            lscr.io/linuxserver/openssh-server:latest

      - name: Test
        # for docker mount
        env:
          TMPDIR: .
        # Run as root for TUN/route setup, but preserve the runner's kubeconfig.
        # Plain `sudo` resets HOME/KUBECONFIG, so client-go falls back to its
        # default server http://localhost:8080 (which collides with the test's
        # own dummy HTTP server) and every API call fails with
        # "serializer for text/plain; charset=utf-8 doesn't exist".
        run: sudo -E env HOME="$HOME" KUBECONFIG="$HOME/.kube/config" TMPDIR="$TMPDIR" make ut

  windows:
    runs-on: windows-latest
    needs: [ "image" ]
    env:
      VERSION: ${{ github.event.pull_request.head.sha || github.sha }}
    defaults:
      run:
        # The Makefile relies on `VAR=x go build` env-prefixes plus cp/eval, which
        # PowerShell can't run — force bash (git bash ships on windows runners).
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      # Switch the runner's Docker to Linux-container mode — kind node images are
      # Linux, and the default Windows daemon runs Windows containers.
      - name: Set up Docker (Linux containers)
        uses: docker/setup-docker-action@v4
        with:
          daemon-config: |
            {
              "features": { "containerd-snapshotter": true }
            }

      - name: Install tools
        run: choco install -y kind kubernetes-cli make

      - name: Create kind cluster
        run: |
          test "$(docker info --format '{{.OSType}}')" = linux  # fail fast if Windows containers
          kind create cluster --wait 120s
          kubectl cluster-info
          kubectl config view --flatten --raw

      - name: Load demo images and deploy bookinfo
        run: |
          imgs=(
            ghcr.io/kubenetworks/examples-bookinfo-details-v1:1.20.2
            ghcr.io/kubenetworks/examples-bookinfo-ratings-v1:1.20.2
            ghcr.io/kubenetworks/examples-bookinfo-reviews-v1:1.20.2
            ghcr.io/kubenetworks/examples-bookinfo-productpage-v1:1.20.2
            ghcr.io/kubenetworks/authors:latest
            ghcr.io/kubenetworks/nginx:latest
          )
          for i in "${imgs[@]}"; do docker pull "$i"; kind load docker-image "$i"; done
          kubectl apply -f samples/bookinfo.yaml

      - name: Build kubevpn.exe and put it on PATH
        run: |
          make kubevpn-windows-amd64
          ./bin/kubevpn.exe version
          # tests run exec.Command("kubevpn", ...); expose kubevpn.exe via a Windows-style PATH entry
          cygpath -w "$PWD/bin" >> "$GITHUB_PATH"

      - name: Wait for pods to be ready
        run: |
          while ! kubectl wait --for=condition=Ready pods --all --timeout=1800s; do sleep 2; done
          kubectl get pod -A -o wide

      - name: Test
        # windows-latest already runs as Administrator, so kubevpn can create the
        # wintun TUN device directly — no sudo/elevation wrapper like the linux job.
        run: make ut