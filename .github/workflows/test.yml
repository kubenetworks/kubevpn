name: Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  image:
    runs-on: ubuntu-latest
    env:
      # Single source of truth: the binary's embedded config.Version AND the image tag both use
      # this, so `kubevpn version` inside the image matches the image tag (the version-compat
      # gate compares them).
      VERSION: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build kubevpn binary
        # VERSION env overrides the Makefile default (?=), embedding it via -X config.Version.
        run: make kubevpn-linux-amd64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/test.Dockerfile
          push: true
          tags: ghcr.io/kubenetworks/kubevpn:${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  linux:
    runs-on: ubuntu-latest
    needs: [ "image" ]
    env:
      # Same VERSION as the image job: the built binary's config.Version/config.Image
      # match the pushed image tag, so the version-compat gate passes and in-process
      # deploy paths reference an image that actually exists.
      VERSION: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          check-latest: true
      - name: Setup Minikube
        id: minikube
        timeout-minutes: 30
        uses: medyagh/setup-minikube@latest
        with:
          cache: true
          cpus: 'max'
          memory: 'max'

      - name: Kubernetes info
        run: |
          kubectl cluster-info
          cat ~/.kube/config
          kubectl get pods -n kube-system -o wide
      - name: Install demo bookinfo
        run: |
          minikube image load --remote ghcr.io/kubenetworks/examples-bookinfo-details-v1:1.20.2
          minikube image load --remote ghcr.io/kubenetworks/examples-bookinfo-ratings-v1:1.20.2
          minikube image load --remote ghcr.io/kubenetworks/examples-bookinfo-reviews-v1:1.20.2
          minikube image load --remote ghcr.io/kubenetworks/examples-bookinfo-productpage-v1:1.20.2
          minikube image load --remote ghcr.io/kubenetworks/authors:latest
          minikube image load --remote ghcr.io/kubenetworks/nginx:latest
          minikube image ls
          eval $(minikube docker-env)
          kubectl apply -f samples/bookinfo.yaml

      - name: Build
        run: |
          make kubevpn-linux-amd64
          chmod +x ./bin/kubevpn
          cp ./bin/kubevpn /usr/local/bin/kubevpn
          kubevpn version

      - name: Wait for pods reviews to be ready
        run: |
          while ! kubectl wait --for=condition=Ready pods --all --timeout=3600s; do sleep 2; done
          kubectl get svc -A -o wide
          kubectl get pod -A -o wide
          kubectl get all -o wide
          kubectl get nodes -o yaml
          ifconfig
          route -n
          sudo ln /usr/bin/resolvectl /usr/bin/systemd-resolve
          docker run -d \
            --name=ssh \
            -e PUID=1000 \
            -e PGID=0 \
            -e TZ=Etc/UTC \
            -e LANG=C.UTF-8 \
            -e SUDO_ACCESS=true \
            -e PASSWORD_ACCESS=true \
            -e USER_PASSWORD=naison \
            -e USER_NAME=naison \
            -e DOCKER_MODS=linuxserver/mods:openssh-server-ssh-tunnel \
            -p 127.0.0.1:2222:2222 \
            --restart always \
            --privileged \
            --net host \
            lscr.io/linuxserver/openssh-server:latest

      - name: Test
        # Run as root for TUN/route setup, but preserve the runner's kubeconfig.
        # Plain `sudo` resets HOME/KUBECONFIG, so client-go falls back to its
        # default server http://localhost:8080 (which collides with the test's
        # own dummy HTTP server) and every API call fails with
        # "serializer for text/plain; charset=utf-8 doesn't exist".
        run: sudo -E env HOME="$HOME" KUBECONFIG="$HOME/.kube/config" VERSION="$VERSION" make ut

  macos:
    runs-on:  macos-15-intel
    needs: [ "image" ]
    env:
      # Same VERSION as the image job (see linux job).
      VERSION: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          check-latest: true

      - name: Set up Docker
        uses: docker/setup-docker-action@v4
        with:
          daemon-config: |
            {
              "debug": true,
              "features": {
                "containerd-snapshotter": true
              }
            }
      - uses: azure/setup-kubectl@v4
      - name: Install minikube
        timeout-minutes: 30
        uses: medyagh/setup-minikube@latest
        with:
          cache: true
          cpus: 'max'
          memory: 'max'

      - name: Kubernetes info
        run: |
          kubectl config view --flatten --raw
          kubectl get pod -A -o wide
          kubectl cluster-info
          cat ~/.kube/config
          kubectl get pods -n kube-system -o wide

      - name: Install demo bookinfo
        run: |
          kubectl apply -f samples/bookinfo.yaml

      - name: Build
        run: |
          make kubevpn-darwin-amd64
          chmod +x ./bin/kubevpn
          cp ./bin/kubevpn /usr/local/bin/kubevpn
          kubevpn version

      - name: Wait for pods reviews to be ready
        run: |
          while ! kubectl wait --for=condition=Ready pods --all --timeout=3600s; do sleep 2; done
          kubectl get svc -A -o wide || true
          kubectl get pod -A -o wide || true
          kubectl get all -o wide || true
          kubectl get nodes -o yaml || true
          ifconfig
          netstat -anr
          docker run -d \
            --name=ssh \
            -e PUID=1000 \
            -e PGID=0 \
            -e TZ=Etc/UTC \
            -e LANG=C.UTF-8 \
            -e SUDO_ACCESS=true \
            -e PASSWORD_ACCESS=true \
            -e USER_PASSWORD=naison \
            -e USER_NAME=naison \
            -e DOCKER_MODS=linuxserver/mods:openssh-server-ssh-tunnel \
            -p 127.0.0.1:2222:2222 \
            --restart always \
            --privileged \
            --net host \
            lscr.io/linuxserver/openssh-server:latest

      - name: Test
        # for docker mount
        env:
          TMPDIR: .
        # Run as root for TUN/route setup, but preserve the runner's kubeconfig.
        # Plain `sudo` resets HOME/KUBECONFIG, so client-go falls back to its
        # default server http://localhost:8080 (which collides with the test's
        # own dummy HTTP server) and every API call fails with
        # "serializer for text/plain; charset=utf-8 doesn't exist".
        run: sudo -E env HOME="$HOME" KUBECONFIG="$HOME/.kube/config" TMPDIR="$TMPDIR" VERSION="$VERSION" make ut

  windows:
    runs-on: windows-latest
    needs: [ "image" ]
    # windows-latest cannot run Linux containers natively (its Docker is Windows/windowsfilter),
    # so the Linux kind cluster runs inside WSL2's Linux Docker. The Windows-native kubevpn.exe
    # (wintun) reaches the cluster API + traffic-manager via 127.0.0.1 (WSL2 localhost forwarding).
    # NOTE: WSL2 Docker/kind on hosted runners is finicky; expect to iterate on this in CI.
    env:
      VERSION: ${{ github.event.pull_request.head.sha || github.sha }}
      # Written from WSL to /mnt/c/kubeconfig; read by the Windows-side kubectl/kubevpn.
      KUBECONFIG: C:\kubeconfig
    defaults:
      run:
        # The Makefile relies on `VAR=x go build` env-prefixes plus cp/eval, which
        # PowerShell can't run — force bash (git bash ships on windows runners).
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up WSL2 (Ubuntu) with Linux Docker
        uses: Vampire/setup-wsl@v3
        with:
          distribution: Ubuntu-22.04
          additional-packages: docker.io curl iproute2

      - name: Create kind cluster + deploy bookinfo (inside WSL2)
        shell: wsl-bash {0}
        run: |
          set -euxo pipefail
          # Start the Linux Docker daemon (no systemd in WSL by default).
          sudo service docker start || (sudo dockerd >/tmp/dockerd.log 2>&1 &)
          for i in $(seq 1 30); do docker info >/dev/null 2>&1 && break; sleep 2; done
          test "$(docker info --format '{{.OSType}}')" = linux  # must be a Linux engine now

          # Install kind + kubectl (Linux) inside WSL.
          sudo curl -sSLo /usr/local/bin/kind https://kind.sigs.k8s.io/dl/v0.23.0/kind-linux-amd64
          sudo curl -sSLo /usr/local/bin/kubectl "https://dl.k8s.io/release/$(curl -sSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo chmod +x /usr/local/bin/kind /usr/local/bin/kubectl

          # Fixed apiServerAddress/port so Windows host can reach the API via WSL2 localhost.
          cat > /tmp/kind.yaml <<'EOF'
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          networking:
            apiServerAddress: 127.0.0.1
            apiServerPort: 6443
          EOF
          sudo kind create cluster --config /tmp/kind.yaml --wait 120s

          for img in \
            ghcr.io/kubenetworks/examples-bookinfo-details-v1:1.20.2 \
            ghcr.io/kubenetworks/examples-bookinfo-ratings-v1:1.20.2 \
            ghcr.io/kubenetworks/examples-bookinfo-reviews-v1:1.20.2 \
            ghcr.io/kubenetworks/examples-bookinfo-productpage-v1:1.20.2 \
            ghcr.io/kubenetworks/authors:latest \
            ghcr.io/kubenetworks/nginx:latest; do
            docker pull "$img"; sudo kind load docker-image "$img"
          done
          sudo kubectl apply -f samples/bookinfo.yaml

          # SSH jump host for TestSSHFunctions (mirrors the linux job); reachable at 127.0.0.1:2222.
          docker run -d --name ssh \
            -e PUID=1000 -e PGID=0 -e TZ=Etc/UTC -e SUDO_ACCESS=true \
            -e PASSWORD_ACCESS=true -e USER_PASSWORD=naison -e USER_NAME=naison \
            -e DOCKER_MODS=linuxserver/mods:openssh-server-ssh-tunnel \
            -p 127.0.0.1:2222:2222 --restart always \
            lscr.io/linuxserver/openssh-server:latest

          # Export kubeconfig to C:\kubeconfig (server already 127.0.0.1:6443) for the Windows side.
          sudo kind get kubeconfig > /mnt/c/kubeconfig

      - name: Install tools (Windows)
        run: choco install -y kubernetes-cli make

      - name: Build kubevpn.exe and put it on PATH
        run: |
          make kubevpn-windows-amd64
          ./bin/kubevpn.exe version
          # tests run exec.Command("kubevpn", ...); expose kubevpn.exe via a Windows-style PATH entry
          cygpath -w "$PWD/bin" >> "$GITHUB_PATH"

      - name: Wait for pods to be ready
        run: |
          kubectl cluster-info
          while ! kubectl wait --for=condition=Ready pods --all --timeout=1800s; do sleep 2; done
          kubectl get pod -A -o wide

      - name: Test
        # windows-latest already runs as Administrator, so kubevpn can create the
        # wintun TUN device directly — no sudo/elevation wrapper like the linux job.
        run: make ut